# hooks.yaml — Hook Registry
# Machine-readable definitions for the hook_runner.py execution engine.
# Human documentation lives in the companion .md files.

hooks:

  # ── 月線跌破監控 ──────────────────────────────────────────────

  ma-breach-1210:
    name: "大成月線跌破計數"
    script: ".venv/Scripts/python.exe scripts/ma_breach_counter.py --code 1210 --ma 20 --alert-days 3 --name 大成 --json"
    targets: ["1210"]
    strategy_class: "dividend_anchor"
    severity_default: "high"
    trigger:
      type: schedule
      every_n_trading_days: 1
    lifecycle:
      auto_disable_on: "ma20_recovered"
      auto_reenable_on: "ma20_breached"
      permanent_disable_on: "position_liquidated"
    retry:
      max_consecutive_failures: 2
      fallback_frequency_days: 1
    doc: "ma-breach-1210.md"

